<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JEON YOUNG HYEON — Portfolio 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fustat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── NAV ── -->
  <nav class="nav">
    <span class="nav-name">JEON YOUNG HYEON</span>
    <ul class="nav-links">
      <li><a href="#home">HOME</a></li>
      <li><a href="#page-02">CONTACT</a></li>
      <li><a href="#download">DOWNLOAD</a></li>
    </ul>
  </nav>

  <!-- ── PAGE 1: HERO ── -->
  <section class="hero" id="home">

    <!-- Background upload zone -->
    <div class="hero-bg-zone" id="hero-bg-zone">
      <input type="file" id="hero-bg-input" accept="image/*,video/*" />
      <span class="hero-bg-label">배경 이미지 업로드</span>
    </div>

    <div class="hero-center">
      <h1 class="hero-title">
        <span class="line" id="typing-line-1"></span>
        <span class="line" id="typing-line-2"></span>
      </h1>
    </div>

  </section>

  <!-- ── PAGES 2–46: PORTFOLIO SCROLL ── -->
  <!-- page-02 slot gets id for CONTACT nav anchor, generated by JS -->
  <section id="portfolio">
    <!-- JS가 45개 슬롯을 자동 생성합니다 (page-02 ~ page-46) -->
  </section>

  <!-- ── DOWNLOAD ── -->
  <section id="download" class="download-section">
    <div class="download-inner">
      <p class="download-label">PORTFOLIO</p>
      <h2 class="download-title">전영현 포트폴리오<br/>PDF 다운로드</h2>
      <p class="download-desc">아래 버튼을 클릭하여 전체 포트폴리오 PDF를 다운로드 받으실 수 있습니다.</p>
      <!-- assets/ 폴더에 portfolio.pdf 파일을 넣으면 다운로드됩니다 -->
      <a href="assets/전영현_Portfolio_20260401.pdf" download="JEON_YOUNG_HYEON_Portfolio_2026.pdf" class="download-btn">
        DOWNLOAD PDF
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 3v13M7 12l5 5 5-5"/><path d="M4 20h16"/>
        </svg>
      </a>
    </div>
  </section>

  <footer class="footer">
    <p>JEON YOUNG HYEON · ©2026 All rights reserved.</p>
  </footer>

  <div class="custom-cursor" id="custom-cursor"></div>
  <script src="script.js"></script>
</body>
</html>
